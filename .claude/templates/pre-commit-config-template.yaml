# Universal pre-commit config template
# Copy to project root as .pre-commit-config.yaml, then run:
#   pip install pre-commit
#   pre-commit install
#   pre-commit install --hook-type commit-msg   # for commitlint
# Hooks fire automatically on every `git commit`.

repos:
  # === Universal hygiene ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']  # block files >1MB by default
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # === Secret scanning (CRITICAL — prevents credential leaks) ===
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # === Conventional commits (commit message format) ===
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, --force-scope]

